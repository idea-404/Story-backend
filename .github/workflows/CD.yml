name: Story-CD

on:
  workflow_run:
    workflows: ["Story-CI"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: story-backend-develop
          path: ./artifact

      - name: Verify artifact
        run: |
          ls -lh ./artifact
          test -f ./artifact/app.jar

      - name: Upload app.jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ./artifact/app.jar
          target: /home/ubuntu/app/jar/build/libs

      # 4️⃣ EC2에서 서비스 재시작
      - name: Restart Spring Boot Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl stop story
            sudo systemctl daemon-reload
            sudo systemctl start story
            sudo systemctl status story --no-pager