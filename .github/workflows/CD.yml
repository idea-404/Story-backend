name: Story-CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build application
        run: ./gradlew clean build -x test

      - name: Rename boot jar to app.jar
        run: |
          JAR_NAME=$(ls build/libs/*boot*.jar | head -n 1)
          mv $JAR_NAME build/libs/app.jar

      - name: Upload jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/app.jar"
          target: "/home/ubuntu/app/jar/build/libs"

      - name: Restart application on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: false
          script: |
            mkdir -p /home/ubuntu/app/jar/build/libs /home/ubuntu/app/logs

            echo "Stopping existing application..."
            pkill -f "/home/ubuntu/app/jar/build/libs/app.jar" || true

            echo "Starting new application..."
            setsid nohup /usr/bin/java -jar /home/ubuntu/app/jar/build/libs/app.jar \
              > /home/ubuntu/app/logs/app.log 2>&1 < /dev/null &

            echo "Application started successfully"
