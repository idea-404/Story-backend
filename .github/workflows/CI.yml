name: Story-CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Package Spring Boot Jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Spring Boot Executable Jar
        run: ./gradlew clean bootJar -x test


      - name: Upload Spring Boot JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: story-backend-develop
          path: build/libs/app.jar
          retention-days: 7

      - name: Build Success
        if: success()
        run: |
          echo "Develop BootJar build completed successfully!"
          echo "Artifact: build/libs/app.jar"
          echo "Branch: develop"

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

  notify:
    name: Notification
    needs: [build, code-quality]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push'

    steps:
      - name: Discord - Success
        if: needs.build.result == 'success'
        run: |
          curl -H "Content-Type: application/json" \
               -d '{
                 "embeds": [{
                   "title": "빌드 성공",
                   "description": "Spring Boot bootJar 생성 완료",
                   "color": 3066993,
                   "fields": [
                     { "name": "Commit", "value": "`${{ github.event.head_commit.message }}`" },
                     { "name": "Author", "value": "${{ github.actor }}", "inline": true },
                     { "name": "Branch", "value": "develop", "inline": true }
                   ]
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK_URL }} || true